    <path d="M48 38 C48 38 60 36 60 43 C60 50 48 50 48 57 C48 64 60 63 60 63" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>
  <!-- Wordmark -->
  <text x="200" y="275" font-family="Georgia, serif" font-weight="800" font-size="54" fill="#166534">ShopInsurance</text>
